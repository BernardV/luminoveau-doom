<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>DOOM</title>

    <!-- PWA / mobile-fullscreen -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DOOM">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&display=swap" rel="stylesheet">

    <style>
        html, body {
            background:#000; margin:0; padding:0; width:100%; height:100%;
            overflow:hidden; overscroll-behavior:none;
        }
        /* Canvas fills the whole viewport (safe-area-aware); no pinch/scroll. */
        canvas.emscripten {
            position:fixed; inset:0; width:100vw; height:100vh;
            display:block; border:0; background:#000;
            touch-action:none; -webkit-tap-highlight-color:transparent;
        }
        canvas:focus { outline:none; }

        /* Start / loading overlay. */
        #startgame {
            font-family:'Barlow Condensed', sans-serif;
            position:fixed; inset:0; z-index:10;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            text-align:center; color:#fff; background:#000;
            padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-tap-highlight-color:transparent; user-select:none;
        }
        #startgame .brand {
            font-size:clamp(3em, 18vw, 9em); letter-spacing:0.12em; font-weight:600;
            color:#e33; text-shadow:0 0 24px rgba(230,40,40,.55); margin:0;
        }
        #startgame .cta {
            font-size:clamp(1.2em, 6vw, 2.2em); margin-top:.4em; color:#fff; opacity:.9;
        }
        #startgame:not(.ready) .cta { opacity:.5; }
        #startgame.ready { cursor:pointer; }
        #progressbar {
            width:60vw; max-width:520px; height:14px; margin-top:1.1em;
            border:2px solid #fff; border-radius:4px; background:#111; overflow:hidden;
        }
        #progressbar > div {
            width:0%; height:100%;
            background:linear-gradient(90deg,#e33,#f96);
            transition:width .15s ease-out;
        }
        #startgame.ready #progressbar { display:none; }
        .err { font-size:.42em; opacity:.8; display:block; margin-top:.5em; line-height:1.4; }
        #version {
            position:fixed; right:max(10px, env(safe-area-inset-right)); bottom:max(8px, env(safe-area-inset-bottom));
            font-family:monospace; font-size:13px; color:#888; opacity:.7; letter-spacing:.02em;
        }
        /* Cheat prompt (opened by the secret button combo). */
        #cheat {
            position:fixed; inset:0; z-index:20; display:none;
            align-items:center; justify-content:center; background:rgba(0,0,0,.7);
            font-family:'Barlow Condensed', sans-serif;
        }
        #cheat.show { display:flex; }
        #cheat .box {
            background:#111; border:2px solid #e33; border-radius:10px; padding:22px 20px;
            width:min(88vw, 420px); text-align:center; box-shadow:0 0 40px rgba(230,40,40,.4);
        }
        #cheat .box h2 { margin:0 0 .3em; color:#e33; font-size:1.8em; letter-spacing:.08em; }
        #cheat .box p  { margin:0 0 .8em; color:#bbb; font-size:1em; }
        #cheat input {
            width:100%; box-sizing:border-box; font-family:monospace; font-size:1.5em;
            text-align:center; text-transform:lowercase; padding:.4em; border-radius:6px;
            border:1px solid #555; background:#000; color:#6f6; outline:none;
        }
        #cheat .row { display:flex; gap:10px; margin-top:14px; }
        #cheat button {
            flex:1; font-family:inherit; font-size:1.3em; padding:.35em; border:0; border-radius:6px;
            cursor:pointer; color:#fff;
        }
        #cheat .send { background:#e33; } #cheat .cancel { background:#444; }
        /* WAD chooser on the start screen. */
        #wadbar {
            font-family:'Barlow Condensed', sans-serif; color:#bbb; margin-top:1.3em;
            font-size:clamp(.85em, 3.5vw, 1.1em); text-align:center; max-width:90vw;
        }
        #wadbar .wadbtn {
            display:inline-block; cursor:pointer; color:#fff; border:1px solid #666;
            border-radius:6px; padding:.35em .9em; margin:.2em; background:rgba(255,255,255,.06);
        }
        #wadbar .wadbtn:hover { border-color:#e33; }
        #wadbar .cur { color:#6f6; }
        #wadbar .muted { color:#888; font-size:.8em; display:block; margin-top:.5em; }
        #wadbar a { color:#e33; cursor:pointer; text-decoration:underline; }
        #wadfile { display:none; }
    </style>
</head>
<body>
    <div id="startgame">
        <h1 class="brand">DOOM</h1>
        <div class="cta" id="startgame-text">Loading&hellip;</div>
        <div id="progressbar"><div></div></div>
        <!-- WAD chooser: shareware (bundled) or the player's own IWAD (kept in the browser). -->
        <div id="wadbar" style="display:none">
            <div id="wad-current">Using the <span class="cur">shareware</span> episode.</div>
            <label class="wadbtn" for="wadfile">Use your own WAD&hellip;</label>
            <a id="wad-reset" style="display:none">use shareware</a>
            <input type="file" id="wadfile" accept=".wad,application/octet-stream">
            <span class="muted">Your WAD stays in this browser (IndexedDB) — never uploaded.</span>
        </div>
        <div id="version">v __DOOM_VERSION__</div>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

    <!-- Cheat prompt: opened by the secret button combo (USE USE WPN WPN FIRE FIRE USE). -->
    <div id="cheat">
        <div class="box">
            <h2>CHEAT</h2>
            <p>Type a code (e.g. iddqd, idkfa, idclip)</p>
            <input id="cheat-input" type="text" autocomplete="off" autocapitalize="off"
                   autocorrect="off" spellcheck="false" enterkeyhint="go" placeholder="tap to type&hellip;">
            <div class="row">
                <button class="cancel" id="cheat-cancel">Cancel</button>
                <button class="send" id="cheat-send">Send</button>
            </div>
        </div>
    </div>

    <script>
        // ── Fullscreen + orientation ──────────────────────────────────────────
        var _wantFullscreen = false;   // set once the user starts; drives auto-restore
        function isFullscreen() {
            return !!(document.fullscreenElement || document.webkitFullscreenElement);
        }
        function goFullscreen() {
            var el = document.documentElement;
            var req = el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen;
            if (req && !isFullscreen()) {
                try { var p = req.call(el); if (p && p.catch) p.catch(function(){}); } catch (e) {}
            }
            if (screen.orientation && screen.orientation.lock) {
                try { screen.orientation.lock('landscape').catch(function(){}); } catch (e) {}
            }
        }
        // Android/Samsung Chrome drops element-fullscreen on all sorts of things — a
        // rotation, the notification shade, an orientation-lock hiccup, the soft
        // keyboard. We only ever requested it once, so a transient drop stuck. Now:
        // whenever we've lost fullscreen but still want it, re-request on the next
        // user gesture (fullscreen can only be entered from within one). Cheap guard
        // so it's a no-op while already fullscreen.
        function restoreFullscreenSoon() {
            // Don't fight the soft keyboard while the cheat prompt is open (re-entering
            // fullscreen would dismiss it).
            var cp = document.getElementById('cheat');
            if (cp && cp.classList.contains('show')) return;
            if (_wantFullscreen && !isFullscreen()) goFullscreen();
        }
        ['touchend', 'pointerup', 'click'].forEach(function (t) {
            window.addEventListener(t, restoreFullscreenSoon, { capture: true, passive: true });
        });
        document.addEventListener('fullscreenchange', function () {
            // If the user deliberately exits (e.g. Back gesture) we still re-enter on
            // their next in-game tap — acceptable: the game is meant to be fullscreen.
        });

        // ── Canvas sizing: fill the viewport at device-pixel resolution ───────
        // The canvas backing size drives the WebGPU swapchain, so it must match the
        // real viewport. Prefer visualViewport (the actually-visible area, excludes
        // the soft keyboard / URL bar) and fall back to innerWidth/Height.
        function resizeCanvas() {
            var c = document.getElementById('canvas');
            if (!c) return;
            var vv = window.visualViewport;
            var vw = (vv && vv.width)  ? vv.width  : window.innerWidth;
            var vh = (vv && vv.height) ? vv.height : window.innerHeight;
            var dpr = window.devicePixelRatio || 1;
            var w = Math.round(vw * dpr), h = Math.round(vh * dpr);
            if (w > 0 && h > 0 && (c.width !== w || c.height !== h)) { c.width = w; c.height = h; }
        }
        // Rotation on Android settles the viewport asynchronously and in stages, so a
        // single delayed resize often reads stale (pre-rotation) dimensions. Re-run a
        // few times after the event to catch the final size.
        function resizeBurst() { [0, 120, 300, 600].forEach(function (d) { setTimeout(resizeCanvas, d); }); }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeBurst);
        if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeCanvas);

        // ── Start gate (also unlocks audio + goes fullscreen) ─────────────────
        var _started = false;
        function startGame() {
            var sg = document.getElementById('startgame');
            if (!sg.classList.contains('ready') || _started) return;
            _started = true;
            _wantFullscreen = true;
            goFullscreen();
            resizeCanvas();
            // miniaudio's AudioContext is created only after the gate releases —
            // keep resuming it for a few seconds so sound starts with the game.
            var tries = 0;
            var t = setInterval(function () {
                if (window.__lumiResumeAudio) window.__lumiResumeAudio();
                if (++tries > 40) clearInterval(t);   // ~10s
            }, 250);
            // If the player chose their own IWAD, drop it into /assets under its
            // canonical name before the engine starts. Doom's IdentifyVersion checks
            // doom2/doomu/doom before the bundled doom1.wad, so it takes precedence.
            var fs = (window.Module && Module.FS) || (typeof FS !== 'undefined' ? FS : null);
            if (window._customWad && fs) {
                try { fs.writeFile('/assets/' + window._customWad.name,
                                   new Uint8Array(window._customWad.bytes)); } catch (e) {
                    console.error('Could not stage custom WAD:', e);
                }
            }
            if (_removeRunDep) _removeRunDep("bixxyengine_init_delay");
            else _autoStartPending = true;
            sg.style.display = 'none';
        }
        document.getElementById('startgame').addEventListener('click', startGame);

        // ── Cheat prompt (invoked from the game via the secret button combo) ──
        (function () {
            var panel = document.getElementById('cheat');
            var input = document.getElementById('cheat-input');
            function cheat(v) {   // hand the typed string (or '' to just close) to the game
                if (window.Module && Module.ccall) {
                    try { Module.ccall('DG_QueueCheat', null, ['string'], [v || '']); } catch (e) {}
                }
            }
            function hide() {
                panel.classList.remove('show'); input.value = ''; input.blur();
                var c = document.getElementById('canvas'); if (c) c.focus();
            }
            function send()   { cheat((input.value || '').trim()); hide(); }
            function cancel() { cheat(''); hide(); }   // '' releases the keyboard, injects nothing
            // The prompt is opened from within a button tap (the combo's last press),
            // so that same finger's touchend/click would otherwise land on the just-
            // shown backdrop and cancel instantly. Arm the backdrop only after a short
            // delay so the opening gesture can't close it.
            var armedAt = 0;
            window.__doomCheatPrompt = function () {
                input.value = '';
                panel.classList.add('show');
                armedAt = Date.now() + 400;
                try { input.focus(); } catch (e) {}   // Android/desktop; iOS needs a tap on the field
            };
            document.getElementById('cheat-send').addEventListener('click', send);
            document.getElementById('cheat-cancel').addEventListener('click', cancel);
            panel.addEventListener('click', function (e) {
                if (e.target === panel && Date.now() >= armedAt) cancel();   // tap backdrop = cancel
            });
            // SDL captures keydown at the document level and preventDefaults it, so the
            // field never fills natively — mirror the typed characters ourselves.
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter')       { e.preventDefault(); send();   return; }
                if (e.key === 'Escape')      { e.preventDefault(); cancel(); return; }
                if (e.key === 'Backspace')   { e.preventDefault(); input.value = input.value.slice(0, -1); return; }
                if (e.key && e.key.length === 1 && /[a-z0-9]/i.test(e.key)) {
                    e.preventDefault();
                    if (input.value.length < 24) input.value += e.key.toLowerCase();
                }
            });
        })();

        // ── Custom IWAD chooser (bring your own DOOM/DOOM II/… WAD) ────────────
        // Stores the chosen WAD in IndexedDB (stays in this browser, never uploaded);
        // startGame() writes it into /assets before the engine reads its IWAD.
        window._customWad = null;   // { name, title, bytes } when a custom WAD is active
        (function () {
            var bar   = document.getElementById('wadbar');
            var curEl = document.getElementById('wad-current');
            var reset = document.getElementById('wad-reset');
            var file  = document.getElementById('wadfile');

            // Tiny IndexedDB store for one record: the chosen WAD.
            function idb(fn) {
                var r = indexedDB.open('doom-wad', 1);
                r.onupgradeneeded = function () { r.result.createObjectStore('wad'); };
                r.onsuccess = function () { fn(r.result); };
                r.onerror   = function () { fn(null); };
            }
            function wadGet(cb) {
                idb(function (db) {
                    if (!db) return cb(null);
                    try { var g = db.transaction('wad').objectStore('wad').get('current');
                          g.onsuccess = function () { cb(g.result || null); };
                          g.onerror = function () { cb(null); }; }
                    catch (e) { cb(null); }
                });
            }
            function wadPut(rec) {
                idb(function (db) { if (db) try { db.transaction('wad', 'readwrite').objectStore('wad').put(rec, 'current'); } catch (e) {} });
            }
            function wadDel() {
                idb(function (db) { if (db) try { db.transaction('wad', 'readwrite').objectStore('wad').delete('current'); } catch (e) {} });
            }

            // Identify an IWAD from its lump directory → canonical filename + title.
            // (IWAD header: 'IWAD', int32 numlumps, int32 dirofs; each 16-byte entry
            // ends with an 8-char name.) Filename drives Doom's gamemode detection.
            function identify(buf) {
                var dv = new DataView(buf), u8 = new Uint8Array(buf);
                var magic = String.fromCharCode(u8[0], u8[1], u8[2], u8[3]);
                if (magic !== 'IWAD' && magic !== 'PWAD') return null;
                var n = dv.getInt32(4, true), ofs = dv.getInt32(8, true);
                if (n <= 0 || ofs <= 0 || ofs + n * 16 > buf.byteLength) return null;
                var names = {}, hasMap01 = false, maxEp = 0;
                for (var i = 0; i < n; i++) {
                    var p = ofs + i * 16, s = '';
                    for (var j = 0; j < 8; j++) { var c = u8[p + 8 + j]; if (!c) break; s += String.fromCharCode(c); }
                    names[s] = 1;
                    if (s === 'MAP01') hasMap01 = true;
                    var m = /^E(\d)M\d$/.exec(s); if (m) maxEp = Math.max(maxEp, +m[1]);
                }
                if (hasMap01)  return { name: 'doom2.wad', title: 'DOOM II / commercial' };
                if (maxEp >= 4) return { name: 'doomu.wad', title: 'The Ultimate DOOM' };
                if (maxEp >= 2) return { name: 'doom.wad',  title: 'Registered DOOM' };
                if (maxEp === 1)return { name: 'doom1.wad', title: 'DOOM (episode 1)' };
                return null;
            }

            function render() {
                var w = window._customWad;
                if (w) {
                    curEl.innerHTML = 'Using <span class="cur">' + w.title + '</span> (your WAD).';
                    reset.style.display = '';
                } else {
                    curEl.innerHTML = 'Using the <span class="cur">shareware</span> episode.';
                    reset.style.display = 'none';
                }
            }

            file.addEventListener('change', function () {
                var f = file.files && file.files[0];
                if (!f) return;
                curEl.textContent = 'Reading ' + f.name + '…';
                var fr = new FileReader();
                fr.onload = function () {
                    var buf = fr.result, info = identify(buf);
                    if (!info) { curEl.innerHTML = '<span style="color:#e33">Not a DOOM IWAD.</span>'; return; }
                    window._customWad = { name: info.name, title: info.title, bytes: buf };
                    wadPut(window._customWad);
                    render();
                };
                fr.readAsArrayBuffer(f);
            });
            reset.addEventListener('click', function () {
                window._customWad = null; wadDel(); file.value = ''; render();
            });
            // Keep clicks inside the chooser from bubbling to #startgame (tap-to-play).
            bar.addEventListener('click', function (e) { e.stopPropagation(); });

            // Restore a previously chosen WAD, then reveal the chooser.
            wadGet(function (rec) {
                if (rec && rec.bytes) window._customWad = rec;
                render();
            });
            window.__doomShowWadBar = function () { bar.style.display = ''; };
        })();

        // ── Service worker (installable / offline) ────────────────────────────
        if ('serviceWorker' in navigator && window.isSecureContext) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js').catch(function(){});
            });
        }

        // ── WebGPU preflight ──────────────────────────────────────────────────
        (async function() {
            var txt = document.getElementById('startgame-text');
            function fail(html) { if (txt) txt.innerHTML = html; document.getElementById('progressbar').style.display = 'none'; }
            if (!window.isSecureContext)
                return fail('WebGPU requires a secure context.<span class="err">Load over HTTPS or http://localhost.</span>');
            if (!navigator.gpu)
                return fail('WebGPU not enabled in this browser.<span class="err">Use Chrome/Edge 113+ or Safari 17.4+.</span>');
            try {
                if (!await navigator.gpu.requestAdapter())
                    fail('No compatible WebGPU adapter.<span class="err">GPU driver may be blocked or out of date.</span>');
            } catch (e) {
                fail('WebGPU adapter request failed.<span class="err">' + e.message + '</span>');
            }
        })();

        function _lumiSetProgress(frac) {
            var bar = document.querySelector('#progressbar > div');
            if (bar) bar.style.width = (Math.max(0, Math.min(1, frac)) * 100).toFixed(1) + '%';
        }
        function _lumiMarkReady() {
            var sg  = document.getElementById('startgame');
            var txt = document.getElementById('startgame-text');
            if (sg) sg.classList.add('ready');
            _lumiSetProgress(1);
            // PWA: always wait for a tap — it unlocks audio and enters fullscreen.
            if (window.isSecureContext && navigator.gpu && txt) txt.textContent = 'Tap to play';
            // Reveal the "use your own WAD" chooser once we're ready to start.
            if (window.isSecureContext && navigator.gpu && window.__doomShowWadBar) window.__doomShowWadBar();
        }

        // ── .wasm download progress bar (HEAD for a reliable total) ───────────
        (function() {
            var _origFetch = window.fetch;
            window.fetch = function(input, opts) {
                var url = (typeof input === 'string') ? input : (input && input.url) || '';
                if (url.indexOf('.wasm') < 0) return _origFetch.apply(this, arguments);
                var totalPromise = _origFetch(url, { method: 'HEAD' })
                    .then(function(h) {
                        if (!h.ok) return 0;
                        var unc = parseInt(h.headers.get('x-uncompressed-content-length') || '0', 10);
                        return unc > 0 ? unc : parseInt(h.headers.get('content-length') || '0', 10);
                    }).catch(function() { return 0; });
                return Promise.all([_origFetch(input, opts), totalPromise]).then(function(arr) {
                    var response = arr[0], total = arr[1];
                    if (!response.ok || !response.body) return response;
                    if (!total) total = parseInt(response.headers.get('content-length') || '0', 10);
                    if (!total) total = 30 * 1024 * 1024;
                    var received = 0, reader = response.body.getReader();
                    var stream = new ReadableStream({ start: function(controller) {
                        (function pump() {
                            return reader.read().then(function(r) {
                                if (r.done) { _lumiSetProgress(1); _lumiMarkReady(); controller.close(); return; }
                                received += r.value.byteLength;
                                if (received > total) total = received;
                                if (total > 0) _lumiSetProgress(received / total);
                                controller.enqueue(r.value);
                                return pump();
                            });
                        })();
                    }});
                    return new Response(stream, { headers: response.headers, status: response.status, statusText: response.statusText });
                });
            };
        })();

        var _addRunDep, _removeRunDep, _autoStartPending = false;

        // Build version — replaced at build time. Stamps every asset request so a
        // fresh build is never served stale from cache, and is shown bottom-right.
        var DOOM_VERSION = "__DOOM_VERSION__";

        var Module = {
            _ma_device__on_notification_unlocked() {},
            locateFile: function(path, prefix) { return prefix + path + "?v=" + DOOM_VERSION; },
            preRun: [], postRun: [],
            print: function() { return function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.log(text);
            }; }(),
            canvas: (() => {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", (e) => { alert('WebGL context lost. Reload the page.'); e.preventDefault(); }, false);
                return canvas;
            })(),
            setStatus: (text) => {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var now = Date.now();
                if (m && now - Module.setStatus.last.time < 30) return;
                Module.setStatus.last.time = now; Module.setStatus.last.text = text;
                if (m) { var cur = parseFloat(m[2]), tot = parseFloat(m[4]); if (tot > 0) _lumiSetProgress(cur / tot); }
            },
            totalDependencies: 0,
            monitorRunDependencies: (left) => {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };
        Module.setStatus('Downloading...');
        window.onerror = () => {
            Module.setStatus('Exception thrown, see JavaScript console');
            Module.setStatus = (text) => { if (text) console.error('[post-exception status] ' + text); };
        };
        Module.preRun.push(function() {
            _addRunDep = addRunDependency;
            _removeRunDep = removeRunDependency;
            _addRunDep("bixxyengine_init_delay");
            if (_autoStartPending) _removeRunDep("bixxyengine_init_delay");
        });
        // Persistent savegames: mount /saves on IndexedDB (IDBFS) and load its contents
        // in before the game starts. Doom writes savegames to /saves (see SAVEGAMENAME)
        // and flushes back to IndexedDB after each save, so they survive a reload.
        Module.preRun.push(function() {
            try {
                FS.mkdir('/saves');
                FS.mount(IDBFS, {}, '/saves');
                addRunDependency('syncfs-saves');
                FS.syncfs(true, function() { removeRunDependency('syncfs-saves'); });
            } catch (e) {
                console.warn('Persistent saves unavailable (IDBFS):', e);
            }
        });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
